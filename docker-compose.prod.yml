services:
  postgres:
    image: postgres:16-alpine
    container_name: zayeh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zayeh
      POSTGRES_PASSWORD: zayeh2026
      POSTGRES_DB: zayehdb
    volumes:
      - zayeh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zayeh -d zayehdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: zayeh_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://zayeh:zayeh2026@postgres:5432/zayehdb}
      JWT_SECRET: ${JWT_SECRET:-zayeh-jwt-secret-2026-ultra-secure}
      PORT: 3333
      FRONTEND_URL: ${FRONTEND_URL:-https://zayeh.com.br,https://www.zayeh.com.br}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://zayeh.com.br}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET:-}
    command: sh -c "npx prisma db push && node dist/index.js"
    ports:
      - "127.0.0.1:3201:3333"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zayeh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3200:80"

volumes:
  zayeh_postgres_data:
