services:
  postgres:
    image: postgres:16-alpine
    container_name: zayeh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zayeh
      POSTGRES_PASSWORD: zayeh2026
      POSTGRES_DB: zayehdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zayeh -d zayehdb']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: zayeh_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://zayeh:zayeh2026@postgres:5432/zayehdb
      JWT_SECRET: zayeh-jwt-secret-2026-ultra-secure
      PORT: 3333
      FRONTEND_URL: http://localhost:5173
      PUBLIC_SITE_URL: http://localhost:5173
      MERCADOPAGO_ACCESS_TOKEN: ""
      MERCADOPAGO_WEBHOOK_SECRET: ""
    ports:
      - '3333:3333'

volumes:
  postgres_data:
